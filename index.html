<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mew 3D Game</title>

<style>
body{margin:0;overflow:hidden;background:black}

#joystick{
 position:fixed;
 bottom:40px;
 left:40px;
 width:120px;
 height:120px;
 background:rgba(0,0,0,0.3);
 border-radius:50%;
}

#stick{
 position:absolute;
 width:50px;
 height:50px;
 background:white;
 border-radius:50%;
 left:35px;
 top:35px;
}
</style>
</head>

<body>

<div id="joystick"><div id="stick"></div></div>

<script src="https://cdn.jsdelivr.net/npm/three@0.152/build/three.min.js"></script>

<script>

// ===== SCENE =====
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);

// ===== CAMERA =====
const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
let angleX = 0;
let angleY = 0;

// ===== RENDER =====
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

// ===== LIGHT =====
scene.add(new THREE.AmbientLight(0xffffff,1));
const light = new THREE.DirectionalLight(0xffffff,1);
light.position.set(10,20,10);
scene.add(light);

// ===== MAP =====
const ground = new THREE.Mesh(
 new THREE.PlaneGeometry(200,200),
 new THREE.MeshStandardMaterial({color:0x3cb043})
);
ground.rotation.x = -Math.PI/2;
scene.add(ground);

// ===== COLLISION =====
const obstacles = [];

// ===== TREE =====
function createTree(x,z){
 const trunk = new THREE.Mesh(
  new THREE.CylinderGeometry(0.3,0.3,2),
  new THREE.MeshStandardMaterial({color:0x8b4513})
 );
 trunk.position.set(x,1,z);

 const leaf = new THREE.Mesh(
  new THREE.SphereGeometry(1),
  new THREE.MeshStandardMaterial({color:0x228B22})
 );
 leaf.position.set(x,2.5,z);

 scene.add(trunk,leaf);
 obstacles.push(trunk);
}

// ===== HOUSE =====
function createHouse(x,z){
 const base = new THREE.Mesh(
  new THREE.BoxGeometry(3,2,3),
  new THREE.MeshStandardMaterial({color:0xffcc99})
 );
 base.position.set(x,1,z);

 const roof = new THREE.Mesh(
  new THREE.ConeGeometry(2.5,2,4),
  new THREE.MeshStandardMaterial({color:0xaa0000})
 );
 roof.position.set(x,3,z);

 scene.add(base,roof);
 obstacles.push(base);
}

// tạo map
createTree(5,5);
createTree(-5,5);
createTree(0,-5);
createHouse(0,10);

// ===== PLAYER (Mew thon) =====
const player = new THREE.Group();

const body = new THREE.Mesh(
 new THREE.SphereGeometry(0.8,32,32),
 new THREE.MeshStandardMaterial({color:0xff99cc})
);
body.position.y = 0.9;

const head = new THREE.Mesh(
 new THREE.SphereGeometry(0.5,32,32),
 new THREE.MeshStandardMaterial({color:0xff99cc})
);
head.position.y = 1.8;

const armL = new THREE.Mesh(
 new THREE.CylinderGeometry(0.1,0.1,0.7),
 new THREE.MeshStandardMaterial({color:0xff99cc})
);
armL.position.set(-0.9,1.1,0);
armL.rotation.z = Math.PI/4;

const armR = armL.clone();
armR.position.x = 0.9;
armR.rotation.z = -Math.PI/4;

const legL = new THREE.Mesh(
 new THREE.CylinderGeometry(0.12,0.12,0.6),
 new THREE.MeshStandardMaterial({color:0xff99cc})
);
legL.position.set(-0.25,0.3,0);

const legR = legL.clone();
legR.position.x = 0.25;

const tail = new THREE.Mesh(
 new THREE.CylinderGeometry(0.1,0.1,3),
 new THREE.MeshStandardMaterial({color:0xff99cc})
);
tail.position.set(0,1,-1.5);
tail.rotation.x = Math.PI/4;

player.add(body,head,armL,armR,legL,legR,tail);
scene.add(player);

// ===== JOYSTICK =====
let moveX = 0;
let moveZ = 0;

const joystick = document.getElementById("joystick");
const stick = document.getElementById("stick");

let dragging = false;

joystick.addEventListener("touchstart", ()=> dragging=true);

joystick.addEventListener("touchmove", e=>{
 if(!dragging) return;

 const touch = e.touches[0];
 const rect = joystick.getBoundingClientRect();

 let x = touch.clientX - rect.left - 60;
 let y = touch.clientY - rect.top - 60;

 const dist = Math.sqrt(x*x+y*y);
 const max = 40;

 if(dist>max){
  x = x/dist*max;
  y = y/dist*max;
 }

 stick.style.left=(x+60-25)+"px";
 stick.style.top=(y+60-25)+"px";

 moveX=x/max;
 moveZ=y/max;
});

joystick.addEventListener("touchend", ()=>{
 dragging=false;
 moveX=0;
 moveZ=0;
 stick.style.left="35px";
 stick.style.top="35px";
});

// ===== CAMERA LOOK =====
let isLook=false,lastX=0,lastY=0;

window.addEventListener("touchstart", e=>{
 if(e.touches[0].clientX>innerWidth/2){
  isLook=true;
  lastX=e.touches[0].clientX;
  lastY=e.touches[0].clientY;
 }
});

window.addEventListener("touchmove", e=>{
 if(!isLook) return;

 let dx=e.touches[0].clientX-lastX;
 let dy=e.touches[0].clientY-lastY;

 angleY -= dx*0.005;
 angleX += dy*0.005;

 angleX=Math.max(-1.2,Math.min(1.2,angleX));

 lastX=e.touches[0].clientX;
 lastY=e.touches[0].clientY;
});

window.addEventListener("touchend", ()=> isLook=false);

// ===== COLLISION CHECK =====
function checkCollision(x,z){
 for(let o of obstacles){
  let dx=x-o.position.x;
  let dz=z-o.position.z;
  if(Math.sqrt(dx*dx+dz*dz)<2) return true;
 }
 return false;
}

// ===== MOVEMENT =====
let velocityX=0,velocityZ=0;

// ===== LOOP =====
function animate(){
 requestAnimationFrame(animate);

 const accel=0.03, friction=0.9;

 velocityX+=moveX*accel;
 velocityZ+=moveZ*accel;

 velocityX*=friction;
 velocityZ*=friction;

 let newX=player.position.x;
 let newZ=player.position.z;

 newX+=Math.sin(angleY)*velocityZ;
 newZ+=Math.cos(angleY)*velocityZ;

 newX+=Math.sin(angleY+Math.PI/2)*velocityX;
 newZ+=Math.cos(angleY+Math.PI/2)*velocityX;

 if(!checkCollision(newX,newZ)){
  player.position.x=newX;
  player.position.z=newZ;
 }

 let speed=Math.abs(velocityX)+Math.abs(velocityZ);
 let t=Date.now()*0.01;

 if(speed>0.01){
  armL.rotation.x=Math.sin(t)*0.8;
  armR.rotation.x=-Math.sin(t)*0.8;
  legL.rotation.x=-Math.sin(t)*0.8;
  legR.rotation.x=Math.sin(t)*0.8;
 }else{
  body.position.y=0.9+Math.sin(t)*0.02;
 }

 // camera
 const d=10;
 camera.position.set(
  player.position.x+Math.sin(angleY)*d*Math.cos(angleX),
  player.position.y+5+Math.sin(angleX)*5,
  player.position.z+Math.cos(angleY)*d*Math.cos(angleX)
 );
 camera.lookAt(player.position);

 renderer.render(scene,camera);
}
animate();

</script>
</body>
</html>
