<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mew Game</title>

<style>
html,body{
  margin:0;
  padding:0;
  overflow:hidden;
  background:black;
  touch-action:none;
}

/* Canvas full màn hình */
canvas{
  display:block;
}

/* UI */
#ui{
  position:absolute;
  top:10px;
  left:10px;
  color:white;
  font-family:sans-serif;
  z-index:10;
}

#fruit{
  position:absolute;
  top:10px;
  right:10px;
  background:black;
  color:white;
  padding:5px;
}

/* Skill buttons */
#skills{
  position:absolute;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
}

.btn{
  display:inline-block;
  background:black;
  color:white;
  padding:10px 15px;
  margin:5px;
  border:2px solid white;
}
</style>

</head>
<body>

<div id="ui">
  <div>HP: <span id="hp">100</span></div>
  <div>MP: <span id="mp">100</span></div>
</div>

<div id="fruit">Trái cây: Không có</div>

<div id="skills">
  <span class="btn">Z</span>
  <span class="btn">X</span>
  <span class="btn">C</span>
  <span class="btn">V</span>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.152/build/three.min.js"></script>

<script>

// ===== AUTO XOAY NGANG MOBILE =====
if(window.innerHeight > window.innerWidth){
  alert("Hãy xoay ngang điện thoại!");
}

// ===== SCENE =====
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);

// ===== CAMERA =====
const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.set(0,10,15);

// ===== RENDER =====
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// ===== LIGHT =====
scene.add(new THREE.DirectionalLight(0xffffff,1.5));
scene.add(new THREE.AmbientLight(0xffffff,1));

// ===== MAP =====
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(200,200),
  new THREE.MeshStandardMaterial({color:0x3cb043})
);
ground.rotation.x = -Math.PI/2;
scene.add(ground);

// ===== TREE =====
function createTree(x,z){
  const trunk = new THREE.Mesh(
    new THREE.CylinderGeometry(0.3,0.3,2),
    new THREE.MeshStandardMaterial({color:0x8B4513})
  );
  trunk.position.set(x,1,z);

  const leaf = new THREE.Mesh(
    new THREE.SphereGeometry(1.2),
    new THREE.MeshStandardMaterial({color:0x228B22})
  );
  leaf.position.set(x,3,z);

  scene.add(trunk);
  scene.add(leaf);
}

// nhiều cây
for(let i=0;i<10;i++){
  createTree(
    Math.random()*40-20,
    Math.random()*40-20
  );
}

// ===== PLAYER (Mew giả lập) =====
const player = new THREE.Mesh(
  new THREE.SphereGeometry(1),
  new THREE.MeshStandardMaterial({color:0xffaadd})
);
scene.add(player);

// ===== NPC =====
const npcs=[];
for(let i=0;i<3;i++){
  const npc = new THREE.Mesh(
    new THREE.BoxGeometry(1,2,1),
    new THREE.MeshStandardMaterial({color:0xff0000})
  );
  npc.position.set(Math.random()*20-10,1,Math.random()*20-10);
  scene.add(npc);
  npcs.push(npc);
}

// ===== TRÁI ÁC QUỶ =====
const fruits=[];
function spawnFruit(){
  const f = new THREE.Mesh(
    new THREE.SphereGeometry(0.5),
    new THREE.MeshStandardMaterial({color:0x8000ff})
  );
  f.position.set(Math.random()*20-10,1,Math.random()*20-10);
  scene.add(f);
  fruits.push(f);
}
setInterval(spawnFruit,5000);

// ===== CONTROL =====
window.addEventListener("keydown", e=>{
  if(e.key==="w") player.position.z -=0.5;
  if(e.key==="s") player.position.z +=0.5;
  if(e.key==="a") player.position.x -=0.5;
  if(e.key==="d") player.position.x +=0.5;
});

// ===== UPDATE =====
function update(){

  // NPC đuổi
  npcs.forEach(npc=>{
    npc.position.x += (player.position.x - npc.position.x)*0.01;
    npc.position.z += (player.position.z - npc.position.z)*0.01;
  });

  // ăn trái
  fruits.forEach((f,i)=>{
    if(player.position.distanceTo(f.position) < 1.5){
      scene.remove(f);
      fruits.splice(i,1);
      document.getElementById("fruit").innerText = "Trái cây: Mew Power";
    }
  });

  // camera follow
  camera.position.lerp(new THREE.Vector3(
    player.position.x,
    player.position.y+8,
    player.position.z+12
  ),0.1);

  camera.lookAt(player.position);
}

// ===== LOOP =====
function animate(){
  requestAnimationFrame(animate);
  update();
  renderer.render(scene,camera);
}
animate();

// ===== RESIZE FIX =====
window.addEventListener("resize",()=>{
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

</script>

</body>
</html>
