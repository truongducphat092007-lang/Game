<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Test Model 3D</title>
<style>
body{margin:0;overflow:hidden}
</style>
</head>

<body>

<script src="https://cdn.jsdelivr.net/npm/three@0.152/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.152/examples/js/loaders/GLTFLoader.js"></script>

<script>

// ===== SCENE =====
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);

// ===== CAMERA =====
const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.set(0, 2, 5);

// ===== RENDER =====
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// ===== LIGHT =====
scene.add(new THREE.AmbientLight(0xffffff,1));

const light = new THREE.DirectionalLight(0xffffff,1);
light.position.set(5,10,5);
scene.add(light);

// ===== LOAD MODEL =====
let player;

const loader = new THREE.GLTFLoader();

loader.load(
 "./model.glb",

 function(gltf){
  console.log("MODEL LOADED");

  player = gltf.scene;

  player.scale.set(1.5,1.5,1.5);
  player.position.set(0,0,0);

  scene.add(player);
 },

 undefined,

 function(error){
  console.error("LỖI MODEL:", error);
 }
);

// ===== LOOP =====
function animate(){
 requestAnimationFrame(animate);

 if(player){
  camera.lookAt(player.position);
 }

 renderer.render(scene,camera);
}

animate();

</script>
</body>
</html>
