<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mew Fix</title>
<style>
body{margin:0;overflow:hidden}
#debug{
position:fixed;
top:10px;
left:10px;
background:black;
color:white;
padding:5px;
}
</style>
</head>
<body>

<div id="debug">Đang khởi động...</div>

<!-- THREE -->
<script src="https://cdn.jsdelivr.net/npm/three@0.152/build/three.min.js"></script>

<!-- FIX QUAN TRỌNG -->
<script type="module">

import { GLTFLoader } from "https://cdn.jsdelivr.net/npm/three@0.152/examples/jsm/loaders/GLTFLoader.js";

const debug = document.getElementById("debug");

// ===== SCENE =====
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);

// ===== CAMERA =====
const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
camera.position.set(0,5,10);

// ===== RENDER =====
const renderer = new THREE.WebGLRenderer();
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

// ===== LIGHT =====
scene.add(new THREE.AmbientLight(0xffffff,1));

// ===== TEST OBJECT =====
const cube = new THREE.Mesh(
  new THREE.BoxGeometry(),
  new THREE.MeshBasicMaterial({color:0xff0000})
);
scene.add(cube);

// ===== LOAD MEW =====
let player;
const loader = new GLTFLoader();

loader.load(
  "https://truongducphat092007-lang.github.io/Game/mew.glb",

  (gltf)=>{
    player = gltf.scene;
    player.scale.set(3,3,3);
    scene.add(player);
    debug.innerHTML = "✅ Mew OK";
  },

  undefined,

  (err)=>{
    debug.innerHTML = "❌ Lỗi load Mew";
    console.log(err);
  }
);

// ===== LOOP =====
function animate(){
  requestAnimationFrame(animate);

  cube.rotation.y += 0.01;

  renderer.render(scene,camera);
}
animate();

</script>

</body>
</html>
