<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mew 3D Real</title>
<style>
body{margin:0;overflow:hidden}
</style>
</head>
<body>

<script src="https://cdn.jsdelivr.net/npm/three@0.152/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.152/examples/js/loaders/GLTFLoader.js"></script>

<script>

// ===== SCENE =====
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);

// ===== CAMERA =====
const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.set(0,6,12);

// ===== RENDER =====
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// ===== LIGHT =====
scene.add(new THREE.AmbientLight(0xffffff,1));
const light = new THREE.DirectionalLight(0xffffff,1.5);
light.position.set(10,20,10);
scene.add(light);

// ===== GROUND =====
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(200,200),
  new THREE.MeshStandardMaterial({color:0x3cb043})
);
ground.rotation.x = -Math.PI/2;
scene.add(ground);

// ===== LOAD MEW =====
let player;
const loader = new THREE.GLTFLoader();

loader.load(
  "https://raw.githubusercontent.com/truongducphat090207-lang/tro-choi/main/mew.glb",

  function(gltf){
    player = gltf.scene;

    player.scale.set(5,5,5);
    player.position.y = 1;

    scene.add(player);
  },

  undefined,

  function(error){
    console.error("Mew lỗi:", error);

    // fallback
    const box = new THREE.Mesh(
      new THREE.BoxGeometry(1,2,1),
      new THREE.MeshStandardMaterial({color:0xff0000})
    );
    box.position.y = 1;
    scene.add(box);
    player = box;
  }
);

// ===== CONTROL =====
const keys = {};
window.addEventListener("keydown", e=> keys[e.key]=true);
window.addEventListener("keyup", e=> keys[e.key]=false);

// ===== LOOP =====
function animate(){
  requestAnimationFrame(animate);

  if(player){
    if(keys["w"]) player.position.z -=0.2;
    if(keys["s"]) player.position.z +=0.2;
    if(keys["a"]) player.position.x -=0.2;
    if(keys["d"]) player.position.x +=0.2;

    camera.position.lerp(new THREE.Vector3(
      player.position.x,
      player.position.y + 5,
      player.position.z + 10
    ),0.1);

    camera.lookAt(player.position);
  }

  renderer.render(scene,camera);
}
animate();

// resize fix
window.addEventListener("resize", ()=>{
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

</script>

</body>
</html>
