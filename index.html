<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mew Debug</title>
<style>
body{margin:0;overflow:hidden}
#debug{
position:fixed;
top:10px;
left:10px;
color:white;
background:black;
padding:5px;
font-size:14px;
}
</style>
</head>
<body>

<div id="debug">Đang khởi động...</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.152/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.152/examples/js/loaders/GLTFLoader.js"></script>

<script>

const debug = document.getElementById("debug");

// ===== TEST THREE =====
if(typeof THREE === "undefined"){
  debug.innerHTML = "❌ LỖI: Không load được THREE";
}

// ===== SCENE =====
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);

// ===== CAMERA =====
const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
camera.position.set(0,5,10);

// ===== RENDER =====
const renderer = new THREE.WebGLRenderer();
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

// ===== LIGHT =====
scene.add(new THREE.AmbientLight(0xffffff,1));

// ===== TEST OBJECT (CHỐNG TRẮNG) =====
const testCube = new THREE.Mesh(
  new THREE.BoxGeometry(),
  new THREE.MeshBasicMaterial({color:0xff0000})
);
scene.add(testCube);

// ===== LOAD MEW =====
let player;
const loader = new THREE.GLTFLoader();

loader.load(
  "https://truongducphat092007-lang.github.io/Game/mew.glb",

  function(gltf){
    player = gltf.scene;
    player.scale.set(5,5,5);
    scene.add(player);

    debug.innerHTML = "✅ Mew load OK";
  },

  function(xhr){
    debug.innerHTML = "Đang load: " + Math.round(xhr.loaded/xhr.total*100) + "%";
  },

  function(error){
    debug.innerHTML = "❌ Lỗi load Mew";
    console.error(error);
  }
);

// ===== LOOP =====
function animate(){
  requestAnimationFrame(animate);

  testCube.rotation.y += 0.01;

  renderer.render(scene,camera);
}
animate();

</script>

</body>
</html>
