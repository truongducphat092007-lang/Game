<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mew Fixed</title>
<style>
body{margin:0;overflow:hidden}
#debug{
position:fixed;
top:10px;
left:10px;
background:black;
color:white;
padding:5px;
z-index:100;
}
</style>
</head>
<body>

<div id="debug">Đang chạy...</div>

<!-- THREE -->
<script src="https://cdn.jsdelivr.net/npm/three@0.152/build/three.min.js"></script>

<!-- FIX LOADER -->
<script src="https://cdn.jsdelivr.net/npm/three@0.152/examples/js/loaders/GLTFLoader.js"></script>

<script>

const debug = document.getElementById("debug");

// ===== SCENE =====
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);

// ===== CAMERA =====
const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.set(0,5,10);

// ===== RENDER =====
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// ===== LIGHT =====
scene.add(new THREE.AmbientLight(0xffffff,1));

// ===== TEST OBJECT =====
const cube = new THREE.Mesh(
  new THREE.BoxGeometry(),
  new THREE.MeshBasicMaterial({color:0xff0000})
);
scene.add(cube);

// ===== LOAD MEW (FIX) =====
let player;

// ⚠️ FIX QUAN TRỌNG
const loader = new THREE.GLTFLoader();

try{
loader.load(
  "./mew.glb",   // đảm bảo cùng thư mục

  function(gltf){
    player = gltf.scene;

    player.scale.set(2,2,2);
    player.position.set(0,1,0);

    scene.add(player);

    debug.innerHTML = "✅ Mew load OK";
  },

  undefined,

  function(error){
    debug.innerHTML = "❌ Không load được Mew";
    console.error(error);
  }
);
}catch(e){
  debug.innerHTML = "❌ Lỗi GLTFLoader";
  console.error(e);
}

// ===== LOOP =====
function animate(){
  requestAnimationFrame(animate);

  cube.rotation.y += 0.01;

  renderer.render(scene,camera);
}
animate();

// ===== RESIZE =====
window.addEventListener("resize", ()=>{
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

debug.innerHTML = "🚀 JS ĐÃ CHẠY";

</script>

</body>
</html>
