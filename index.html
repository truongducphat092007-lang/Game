<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mew 3D Real</title>
<style>
body{margin:0;overflow:hidden}
</style>
</head>
<body>

<script src="https://cdn.jsdelivr.net/npm/three@0.152/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.152/examples/js/loaders/GLTFLoader.js"></script>

<script>

// ===== SCENE =====
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);

// ===== CAMERA =====
const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.set(0,6,12);

// ===== RENDER =====
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// ===== LIGHT =====
const light = new THREE.DirectionalLight(0xffffff,1.5);
light.position.set(10,20,10);
scene.add(light);
scene.add(new THREE.AmbientLight(0xffffff,1));

// ===== GROUND =====
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(200,200),
  new THREE.MeshStandardMaterial({color:0x3cb043})
);
ground.rotation.x = -Math.PI/2;
scene.add(ground);

// ===== LOAD MEW =====
let player;
const loader = new THREE.GLTFLoader();

loader.load(
  "https://raw.githubusercontent.com/truongducphat090207-lang/tro-choi/main/mew.glb",

  function(gltf){
    console.log("Load OK");
    player = gltf.scene;
    player.scale.set(2,2,2);
    player.position.set(0,0,0);
    scene.add(player);
  },

  undefined,

  function(error){
    console.error("Lỗi load model:", error);
  }
);

// ===== CONTROL =====
window.addEventListener("keydown", e=>{
  if(!player) return;

  if(e.key==="w") player.position.z -=0.5;
  if(e.key==="s") player.position.z +=0.5;
  if(e.key==="a") player.position.x -=0.5;
  if(e.key==="d") player.position.x +=0.5;
});

// ===== CAMERA FOLLOW =====
function updateCamera(){
  if(!player) return;

  camera.position.lerp(new THREE.Vector3(
    player.position.x,
    player.position.y + 4,
    player.position.z + 8
  ),0.1);

  camera.lookAt(player.position);
}

// ===== LOOP =====
function animate(){
  requestAnimationFrame(animate);

  updateCamera();

  renderer.render(scene,camera);
}

animate();

</script>

</body>
</html>
