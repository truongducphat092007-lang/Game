<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mew Working 100%</title>
<style>
body{margin:0;overflow:hidden}
#debug{
position:fixed;
top:10px;
left:10px;
background:black;
color:white;
padding:5px;
}
</style>
</head>
<body>

<div id="debug">Đang chạy...</div>

<!-- THREE -->
<script src="https://cdn.jsdelivr.net/npm/three@0.152/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.152/examples/js/loaders/GLTFLoader.js"></script>

<script>

const debug = document.getElementById("debug");

// ===== SCENE =====
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);

// ===== CAMERA =====
const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.set(0,5,10);

// ===== RENDER =====
const renderer = new THREE.WebGLRenderer();
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// ===== LIGHT =====
scene.add(new THREE.AmbientLight(0xffffff,1));

// ===== TEST OBJECT (CHẮC CHẮN HIỆN) =====
const cube = new THREE.Mesh(
  new THREE.BoxGeometry(),
  new THREE.MeshBasicMaterial({color:0xff0000})
);
scene.add(cube);

// ===== LOAD MEW =====
let player;
const loader = new THREE.GLTFLoader();

loader.load(
  "mew.glb",   // 🔥 dùng file local

  function(gltf){
    player = gltf.scene;
    player.scale.set(3,3,3);
    player.position.y = 1;
    scene.add(player);

    debug.innerHTML = "✅ Mew OK";
  },

  undefined,

  function(error){
    debug.innerHTML = "❌ Không load được Mew";
    console.log(error);
  }
);

// ===== LOOP =====
function animate(){
  requestAnimationFrame(animate);

  cube.rotation.y += 0.01;

  renderer.render(scene,camera);
}
animate();

// ===== FIX MOBILE =====
window.addEventListener("resize", ()=>{
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

</script>

</body>
</html>
