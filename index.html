<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mew 3D Fix Full</title>
<style>
body{margin:0;overflow:hidden}
#loading{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:20px;
color:white;
}
</style>
</head>
<body>

<div id="loading">Đang load Mew...</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.152/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.152/examples/js/loaders/GLTFLoader.js"></script>

<script>

// ===== SCENE =====
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);

// ===== CAMERA =====
const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.set(0,6,12);

// ===== RENDER =====
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// ===== LIGHT =====
scene.add(new THREE.AmbientLight(0xffffff,1));
const light = new THREE.DirectionalLight(0xffffff,1.5);
light.position.set(10,20,10);
scene.add(light);

// ===== GROUND =====
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(200,200),
  new THREE.MeshStandardMaterial({color:0x3cb043})
);
ground.rotation.x = -Math.PI/2;
scene.add(ground);

// ===== PLAYER =====
let player;
const loader = new THREE.GLTFLoader();

// 🔥 LOAD MODEL (CÓ FALLBACK)
loader.load(

  // 👉 MODEL CỦA BẠN
  "https://raw.githubusercontent.com/truongducphat090207-lang/tro-choi/main/mew.glb",

  function(gltf){
    player = gltf.scene;
    player.scale.set(5,5,5);
    player.position.y = 1;
    scene.add(player);

    document.getElementById("loading").style.display="none";
    console.log("Mew load OK");
  },

  function(xhr){
    console.log((xhr.loaded/xhr.total*100)+"%");
  },

  function(error){
    console.error("Lỗi Mew → chuyển sang model backup");

    // 🔥 FALLBACK (KHÔNG BAO GIỜ TRẮNG)
    loader.load(
      "https://threejs.org/examples/models/gltf/RobotExpressive.glb",
      function(gltf){
        player = gltf.scene;
        player.scale.set(2,2,2);
        scene.add(player);
        document.getElementById("loading").innerHTML="Mew lỗi → đang dùng robot";
      }
    );
  }
);

// ===== CONTROL =====
window.addEventListener("keydown", e=>{
  if(!player) return;

  if(e.key==="w") player.position.z -=0.5;
  if(e.key==="s") player.position.z +=0.5;
  if(e.key==="a") player.position.x -=0.5;
  if(e.key==="d") player.position.x +=0.5;
});

// ===== CAMERA FOLLOW =====
function updateCamera(){
  if(!player) return;

  camera.position.lerp(new THREE.Vector3(
    player.position.x,
    player.position.y + 5,
    player.position.z + 10
  ),0.1);

  camera.lookAt(player.position);
}

// ===== RESIZE FIX =====
window.addEventListener("resize", ()=>{
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ===== LOOP =====
function animate(){
  requestAnimationFrame(animate);
  updateCamera();
  renderer.render(scene,camera);
}
animate();

</script>

</body>
</html>
