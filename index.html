<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Anime 3D Game</title>

<style>
body{margin:0;overflow:hidden;background:black}

#joystick{
 position:fixed;
 bottom:40px;
 left:40px;
 width:120px;
 height:120px;
 background:rgba(0,0,0,0.3);
 border-radius:50%;
}

#stick{
 position:absolute;
 width:50px;
 height:50px;
 background:white;
 border-radius:50%;
 left:35px;
 top:35px;
}
</style>
</head>

<body>

<div id="joystick"><div id="stick"></div></div>

<script src="https://cdn.jsdelivr.net/npm/three@0.152/build/three.min.js"></script>

<script>

// ===== SCENE =====
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);

// ===== CAMERA =====
const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
let angleX=0, angleY=0;

// ===== RENDER =====
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

// ===== LIGHT =====
scene.add(new THREE.AmbientLight(0xffffff,1));
const light = new THREE.DirectionalLight(0xffffff,1);
light.position.set(10,20,10);
scene.add(light);

// ===== MAP =====
const ground = new THREE.Mesh(
 new THREE.PlaneGeometry(200,200),
 new THREE.MeshStandardMaterial({color:0x3cb043})
);
ground.rotation.x = -Math.PI/2;
scene.add(ground);

// ===== COLLISION =====
const obstacles = [];

// ===== TREE =====
function createTree(x,z){
 const trunk = new THREE.Mesh(
  new THREE.CylinderGeometry(0.3,0.3,2),
  new THREE.MeshStandardMaterial({color:0x8b4513})
 );
 trunk.position.set(x,1,z);

 const leaf = new THREE.Mesh(
  new THREE.SphereGeometry(1),
  new THREE.MeshStandardMaterial({color:0x228B22})
 );
 leaf.position.set(x,2.5,z);

 scene.add(trunk,leaf);
 obstacles.push(trunk);
}

// ===== HOUSE =====
function createHouse(x,z){
 const base = new THREE.Mesh(
  new THREE.BoxGeometry(3,2,3),
  new THREE.MeshStandardMaterial({color:0xffcc99})
 );
 base.position.set(x,1,z);

 const roof = new THREE.Mesh(
  new THREE.ConeGeometry(2.5,2,4),
  new THREE.MeshStandardMaterial({color:0xaa0000})
 );
 roof.position.set(x,3,z);

 scene.add(base,roof);
 obstacles.push(base);
}

// tạo map
createTree(5,5);
createTree(-5,5);
createTree(0,-5);
createHouse(0,10);

// ===== PLAYER ANIME =====
const player = new THREE.Group();

// head
const head = new THREE.Mesh(
 new THREE.SphereGeometry(0.5,32,32),
 new THREE.MeshStandardMaterial({color:0xffe0bd})
);
head.position.y = 2;

// eyes
const eyeL = new THREE.Mesh(
 new THREE.SphereGeometry(0.05),
 new THREE.MeshStandardMaterial({color:0x000000})
);
eyeL.position.set(-0.15,2,0.45);

const eyeR = eyeL.clone();
eyeR.position.x = 0.15;

// hair
const hair = new THREE.Mesh(
 new THREE.BoxGeometry(1,1.2,0.8),
 new THREE.MeshStandardMaterial({color:0xffcc99})
);
hair.position.set(0,2,-0.1);

// body
const body = new THREE.Mesh(
 new THREE.BoxGeometry(1,1.2,0.6),
 new THREE.MeshStandardMaterial({color:0xffffff})
);
body.position.y = 1;

// skirt
const skirt = new THREE.Mesh(
 new THREE.ConeGeometry(0.8,0.8,4),
 new THREE.MeshStandardMaterial({color:0x222244})
);
skirt.position.y = 0.4;
skirt.rotation.y = Math.PI/4;

// arms
const armL = new THREE.Mesh(
 new THREE.CylinderGeometry(0.1,0.1,1),
 new THREE.MeshStandardMaterial({color:0xffe0bd})
);
armL.position.set(-0.8,1.2,0);
armL.rotation.z = Math.PI/6;

const armR = armL.clone();
armR.position.x = 0.8;
armR.rotation.z = -Math.PI/6;

// legs
const legL = new THREE.Mesh(
 new THREE.CylinderGeometry(0.12,0.12,1),
 new THREE.MeshStandardMaterial({color:0x000000})
);
legL.position.set(-0.3,0,0);

const legR = legL.clone();
legR.position.x = 0.3;

player.add(head,eyeL,eyeR,hair,body,skirt,armL,armR,legL,legR);
scene.add(player);

// ===== JOYSTICK =====
let moveX=0, moveZ=0;
const joystick=document.getElementById("joystick");
const stick=document.getElementById("stick");
let dragging=false;

joystick.addEventListener("touchstart",()=>dragging=true);

joystick.addEventListener("touchmove",e=>{
 if(!dragging) return;

 const t=e.touches[0];
 const r=joystick.getBoundingClientRect();

 let x=t.clientX-r.left-60;
 let y=t.clientY-r.top-60;

 let d=Math.sqrt(x*x+y*y);
 if(d>40){ x=x/d*40; y=y/d*40; }

 stick.style.left=(x+35)+"px";
 stick.style.top=(y+35)+"px";

 moveX=x/40;
 moveZ=y/40;
});

joystick.addEventListener("touchend",()=>{
 dragging=false;
 moveX=0; moveZ=0;
 stick.style.left="35px";
 stick.style.top="35px";
});

// ===== LOOK =====
let look=false,lastX=0,lastY=0;

window.addEventListener("touchstart",e=>{
 if(e.touches[0].clientX>innerWidth/2){
  look=true;
  lastX=e.touches[0].clientX;
  lastY=e.touches[0].clientY;
 }
});

window.addEventListener("touchmove",e=>{
 if(!look) return;

 let dx=e.touches[0].clientX-lastX;
 let dy=e.touches[0].clientY-lastY;

 angleY-=dx*0.005;
 angleX+=dy*0.005;

 angleX=Math.max(-1.2,Math.min(1.2,angleX));

 lastX=e.touches[0].clientX;
 lastY=e.touches[0].clientY;
});

window.addEventListener("touchend",()=>look=false);

// ===== COLLISION =====
function checkCollision(x,z){
 for(let o of obstacles){
  let dx=x-o.position.x;
  let dz=z-o.position.z;
  if(Math.sqrt(dx*dx+dz*dz)<2) return true;
 }
 return false;
}

// ===== MOVE =====
let vx=0,vz=0;

function animate(){
 requestAnimationFrame(animate);

 vx+=moveX*0.03;
 vz+=moveZ*0.03;

 vx*=0.9;
 vz*=0.9;

 let nx=player.position.x;
 let nz=player.position.z;

 nx+=Math.sin(angleY)*vz;
 nz+=Math.cos(angleY)*vz;

 nx+=Math.sin(angleY+Math.PI/2)*vx;
 nz+=Math.cos(angleY+Math.PI/2)*vx;

 if(!checkCollision(nx,nz)){
  player.position.x=nx;
  player.position.z=nz;
 }

 let speed=Math.abs(vx)+Math.abs(vz);
 let t=Date.now()*0.01;

 if(speed>0.01){
  armL.rotation.x=Math.sin(t);
  armR.rotation.x=-Math.sin(t);
  legL.rotation.x=-Math.sin(t);
  legR.rotation.x=Math.sin(t);
 }

 // camera
 let d=10;
 camera.position.set(
  player.position.x+Math.sin(angleY)*d*Math.cos(angleX),
  player.position.y+5+Math.sin(angleX)*5,
  player.position.z+Math.cos(angleY)*d*Math.cos(angleX)
 );

 camera.lookAt(player.position);
 renderer.render(scene,camera);
}

animate();

</script>
</body>
</html>
