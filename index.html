<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Side Game</title>
<style>
body{margin:0;overflow:hidden;font-family:sans-serif}

#text{position:fixed;top:10px;left:10px;background:black;color:white;padding:5px}
#hp{position:fixed;top:40px;left:10px;background:black;color:red;padding:5px}
#mp{position:fixed;top:70px;left:10px;background:black;color:cyan;padding:5px}
#fruit{position:fixed;top:10px;right:10px;background:black;color:white;padding:10px}

#ui{
position:fixed;
bottom:10px;
left:50%;
transform:translateX(-50%);
display:flex;
gap:10px;
}
.skill{background:black;color:white;padding:10px;border:2px solid white}
</style>
</head>
<body>

<div id="text">Side Game</div>
<div id="hp">HP: 100</div>
<div id="mp">MP: 100</div>
<div id="fruit">Fruit: None</div>

<div id="ui">
<div class="skill">Z</div>
<div class="skill">X</div>
<div class="skill">C</div>
<div class="skill">V</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.152/build/three.min.js"></script>

<script>

// ===== SETUP =====
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);

const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);

const renderer = new THREE.WebGLRenderer();
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

scene.add(new THREE.AmbientLight(0xffffff,1));

// ===== GROUND =====
const ground = new THREE.Mesh(
 new THREE.BoxGeometry(200,1,10),
 new THREE.MeshBasicMaterial({color:0x3cb043})
);
ground.position.y = -0.5;
scene.add(ground);

// ===== PLAYER =====
let player = new THREE.Mesh(
 new THREE.BoxGeometry(1,2,1),
 new THREE.MeshBasicMaterial({color:0xffb6c1})
);
player.position.y = 1;
scene.add(player);

// ===== PHYSICS =====
let velocityY = 0;
let gravity = -0.02;
let onGround = true;

// ===== STATS =====
let playerHP = 100;
let playerMP = 100;
let currentFruit = "None";

// ===== NPC =====
const fruits = ["Flame","Lightning","Ice","Dark","Mew","Mewtwo"];
const npc = new THREE.Mesh(
 new THREE.BoxGeometry(1,2,1),
 new THREE.MeshBasicMaterial({color:0x0000ff})
);
npc.position.set(10,1,0);
npc.fruit = fruits[Math.floor(Math.random()*fruits.length)];
scene.add(npc);

// ===== ENEMY =====
const enemies = [];
function spawnEnemy(x){
 let e = new THREE.Mesh(
  new THREE.BoxGeometry(1,2,1),
  new THREE.MeshBasicMaterial({color:0xff0000})
 );
 e.position.set(x,1,0);
 e.hp = 50;
 scene.add(e);
 enemies.push(e);
}
for(let i=0;i<5;i++) spawnEnemy(i*10+20);

// ===== CONTROL =====
const keys = {};
window.addEventListener("keydown",e=>keys[e.key]=true);
window.addEventListener("keyup",e=>keys[e.key]=false);

// ===== NHẬN TRÁI =====
window.addEventListener("keydown",e=>{
 if(e.key==="e" && player.position.distanceTo(npc.position)<3){
  currentFruit = npc.fruit;
  document.getElementById("fruit").innerHTML="Fruit: "+currentFruit;
 }
});

// ===== DAMAGE =====
function damageEnemy(radius,dmg){
 enemies.forEach((e,i)=>{
  if(Math.abs(e.position.x-player.position.x)<radius){
   e.hp -= dmg;
   if(e.hp<=0){
    scene.remove(e);
    enemies.splice(i,1);
   }
  }
 });
}

// ===== MANA =====
function useMana(cost){
 if(playerMP>=cost){
  playerMP-=cost;
  document.getElementById("mp").innerHTML="MP: "+Math.floor(playerMP);
  return true;
 }
 return false;
}

// ===== SKILL =====
window.addEventListener("keydown",e=>{

 if(currentFruit==="Mew" && e.key==="z" && useMana(10)){
  damageEnemy(5,20);
 }

 if(currentFruit==="Mewtwo"){
  if(e.key==="z" && useMana(10)) damageEnemy(5,20);
  if(e.key==="x" && useMana(20)) damageEnemy(8,40);
 }

});

// ===== LOOP =====
function animate(){
 requestAnimationFrame(animate);

 // di chuyển ngang
 if(keys["a"]) player.position.x -=0.2;
 if(keys["d"]) player.position.x +=0.2;

 // nhảy
 if(keys["w"] && onGround){
  velocityY = 0.4;
  onGround = false;
 }

 // gravity
 velocityY += gravity;
 player.position.y += velocityY;

 if(player.position.y <= 1){
  player.position.y = 1;
  velocityY = 0;
  onGround = true;
 }

 // camera ngang
 camera.position.set(player.position.x,5,15);
 camera.lookAt(player.position.x,1,0);

 // enemy attack
 enemies.forEach(e=>{
  if(Math.abs(e.position.x-player.position.x)<2){
   playerHP -= 0.2;
   document.getElementById("hp").innerHTML="HP: "+Math.floor(playerHP);
  }
 });

 // mana regen
 if(playerMP<100){
  playerMP+=0.1;
  document.getElementById("mp").innerHTML="MP: "+Math.floor(playerMP);
 }

 if(playerHP<=0){
  alert("YOU DIED");
  location.reload();
 }

 renderer.render(scene,camera);
}
animate();

</script>
</body>
</html>
