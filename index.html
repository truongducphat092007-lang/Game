<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Game Mew 3D Full</title>
<style>
body{margin:0;overflow:hidden}
#loading{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
color:white;
font-size:20px;
}
</style>
</head>
<body>

<div id="loading">Đang load nhân vật...</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.152/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.152/examples/js/loaders/GLTFLoader.js"></script>

<script>

// ===== SCENE =====
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);

// ===== CAMERA =====
const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
camera.position.set(0,8,15);

// ===== RENDER =====
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

// ===== LIGHT =====
scene.add(new THREE.AmbientLight(0xffffff,1));
const light = new THREE.DirectionalLight(0xffffff,1.5);
light.position.set(10,20,10);
scene.add(light);

// ===== GROUND =====
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(200,200),
  new THREE.MeshStandardMaterial({color:0x3cb043})
);
ground.rotation.x = -Math.PI/2;
scene.add(ground);

// ===== TREE =====
function createTree(x,z){
  const trunk = new THREE.Mesh(
    new THREE.CylinderGeometry(0.5,0.5,4),
    new THREE.MeshStandardMaterial({color:0x8B4513})
  );
  trunk.position.set(x,2,z);

  const leaves = new THREE.Mesh(
    new THREE.SphereGeometry(2),
    new THREE.MeshStandardMaterial({color:0x228B22})
  );
  leaves.position.set(x,5,z);

  scene.add(trunk, leaves);
}

for(let i=0;i<10;i++){
  createTree(Math.random()*100-50, Math.random()*100-50);
}

// ===== HOUSE =====
const house = new THREE.Mesh(
  new THREE.BoxGeometry(6,5,6),
  new THREE.MeshStandardMaterial({color:0xffe4c4})
);
house.position.set(-10,2.5,0);
scene.add(house);

const roof = new THREE.Mesh(
  new THREE.ConeGeometry(5,3,4),
  new THREE.MeshStandardMaterial({color:0xff0000})
);
roof.position.set(-10,6,0);
roof.rotation.y = Math.PI/4;
scene.add(roof);

// ===== PLAYER =====
let player;
const loader = new THREE.GLTFLoader();

// 🔥 LOAD MEW + FALLBACK
loader.load(
  "https://raw.githubusercontent.com/truongducphat090207-lang/tro-choi/main/mew.glb",

  function(gltf){
    player = gltf.scene;
    player.scale.set(5,5,5);
    player.position.y = 1;
    scene.add(player);
    document.getElementById("loading").style.display="none";
  },

  undefined,

  function(error){
    console.error("Mew lỗi → dùng robot");

    loader.load(
      "https://threejs.org/examples/models/gltf/RobotExpressive.glb",
      function(gltf){
        player = gltf.scene;
        player.scale.set(2,2,2);
        player.position.y = 1;
        scene.add(player);
        document.getElementById("loading").innerHTML="Mew lỗi → dùng robot";
      }
    );
  }
);

// ===== CONTROL =====
const keys = {};
window.addEventListener("keydown", e=> keys[e.key]=true);
window.addEventListener("keyup", e=> keys[e.key]=false);

// ===== LOOP =====
function animate(){
  requestAnimationFrame(animate);

  if(player){
    if(keys["w"]) player.position.z -=0.2;
    if(keys["s"]) player.position.z +=0.2;
    if(keys["a"]) player.position.x -=0.2;
    if(keys["d"]) player.position.x +=0.2;

    camera.position.lerp(new THREE.Vector3(
      player.position.x,
      player.position.y + 8,
      player.position.z + 12
    ),0.1);

    camera.lookAt(player.position);
  }

  renderer.render(scene,camera);
}
animate();

// ===== RESIZE =====
window.addEventListener("resize", ()=>{
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

</script>

</body>
</html>
