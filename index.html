<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mew 3D Game</title>

<style>
body{margin:0;overflow:hidden;background:black}

/* JOYSTICK */
#joystick{
 position:fixed;
 bottom:40px;
 left:40px;
 width:120px;
 height:120px;
 background:rgba(0,0,0,0.3);
 border-radius:50%;
}

#stick{
 position:absolute;
 width:50px;
 height:50px;
 background:white;
 border-radius:50%;
 left:35px;
 top:35px;
}
</style>
</head>

<body>

<div id="joystick">
 <div id="stick"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.152/build/three.min.js"></script>

<script>

// ===== SCENE =====
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);

// ===== CAMERA =====
const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);

let angleX = 0;
let angleY = 0;

// ===== RENDER =====
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

// ===== LIGHT =====
scene.add(new THREE.AmbientLight(0xffffff,1));
const light = new THREE.DirectionalLight(0xffffff,1);
light.position.set(10,20,10);
scene.add(light);

// ===== MAP =====
const ground = new THREE.Mesh(
 new THREE.PlaneGeometry(200,200),
 new THREE.MeshStandardMaterial({color:0x3cb043})
);
ground.rotation.x = -Math.PI/2;
scene.add(ground);

// ===== TREE =====
function createTree(x,z){
 const trunk = new THREE.Mesh(
  new THREE.CylinderGeometry(0.3,0.3,2),
  new THREE.MeshStandardMaterial({color:0x8b4513})
 );
 trunk.position.set(x,1,z);

 const leaf = new THREE.Mesh(
  new THREE.SphereGeometry(1),
  new THREE.MeshStandardMaterial({color:0x228B22})
 );
 leaf.position.set(x,2.5,z);

 scene.add(trunk,leaf);
}

createTree(5,5);
createTree(-5,5);
createTree(0,-5);

// ===== PLAYER (Mew dạng người) =====
const player = new THREE.Group();

// body
const body = new THREE.Mesh(
 new THREE.SphereGeometry(1,32,32),
 new THREE.MeshStandardMaterial({color:0xff99cc})
);
body.position.y = 1;
player.add(body);

// head
const head = new THREE.Mesh(
 new THREE.SphereGeometry(0.7,32,32),
 new THREE.MeshStandardMaterial({color:0xff99cc})
);
head.position.y = 2.3;
player.add(head);

// eyes
const eye1 = new THREE.Mesh(
 new THREE.SphereGeometry(0.1),
 new THREE.MeshStandardMaterial({color:0x0000ff})
);
eye1.position.set(0.2,2.3,0.6);

const eye2 = eye1.clone();
eye2.position.x = -0.2;

player.add(eye1, eye2);

// arms
const armL = new THREE.Mesh(
 new THREE.CylinderGeometry(0.15,0.15,1),
 new THREE.MeshStandardMaterial({color:0xff99cc})
);
armL.position.set(-1.2,1.2,0);
armL.rotation.z = Math.PI/4;

const armR = armL.clone();
armR.position.x = 1.2;
armR.rotation.z = -Math.PI/4;

player.add(armL, armR);

// legs
const legL = new THREE.Mesh(
 new THREE.CylinderGeometry(0.2,0.2,1),
 new THREE.MeshStandardMaterial({color:0xff99cc})
);
legL.position.set(-0.4,0.3,0);

const legR = legL.clone();
legR.position.x = 0.4;

player.add(legL, legR);

scene.add(player);

// ===== JOYSTICK =====
let moveX = 0;
let moveZ = 0;

const joystick = document.getElementById("joystick");
const stick = document.getElementById("stick");

let dragging = false;

joystick.addEventListener("touchstart", ()=> dragging = true);

joystick.addEventListener("touchmove", e=>{
 if(!dragging) return;

 const touch = e.touches[0];
 const rect = joystick.getBoundingClientRect();

 let x = touch.clientX - rect.left - 60;
 let y = touch.clientY - rect.top - 60;

 const dist = Math.sqrt(x*x + y*y);
 const max = 40;

 if(dist > max){
  x = x/dist * max;
  y = y/dist * max;
 }

 stick.style.left = (x+60-25)+"px";
 stick.style.top = (y+60-25)+"px";

 moveX = x / max;
 moveZ = y / max;
});

joystick.addEventListener("touchend", ()=>{
 dragging = false;
 stick.style.left = "35px";
 stick.style.top = "35px";
 moveX = 0;
 moveZ = 0;
});

// ===== CAMERA LOOK =====
let isLook = false;
let lastX = 0;
let lastY = 0;

window.addEventListener("touchstart", e=>{
 if(e.touches[0].clientX > window.innerWidth/2){
  isLook = true;
  lastX = e.touches[0].clientX;
  lastY = e.touches[0].clientY;
 }
});

window.addEventListener("touchmove", e=>{
 if(!isLook) return;

 const touch = e.touches[0];

 let dx = touch.clientX - lastX;
 let dy = touch.clientY - lastY;

 angleY -= dx * 0.005;
 angleX += dy * 0.005;

 angleX = Math.max(-1.2, Math.min(1.2, angleX));

 lastX = touch.clientX;
 lastY = touch.clientY;
});

window.addEventListener("touchend", ()=> isLook = false);

// ===== MOVEMENT =====
let velocityX = 0;
let velocityZ = 0;

// ===== LOOP =====
function animate(){
 requestAnimationFrame(animate);

 const accel = 0.03;
 const friction = 0.9;

 velocityX += moveX * accel;
 velocityZ += moveZ * accel;

 velocityX *= friction;
 velocityZ *= friction;

 player.position.x += Math.sin(angleY) * velocityZ;
 player.position.z += Math.cos(angleY) * velocityZ;

 player.position.x += Math.sin(angleY + Math.PI/2) * velocityX;
 player.position.z += Math.cos(angleY + Math.PI/2) * velocityX;

 // animation tay chân
 let time = Date.now() * 0.005;

 armL.rotation.x = Math.sin(time) * 0.5;
 armR.rotation.x = -Math.sin(time) * 0.5;

 legL.rotation.x = -Math.sin(time) * 0.5;
 legR.rotation.x = Math.sin(time) * 0.5;

 // camera
 const distance = 10;

 const camX = player.position.x + Math.sin(angleY) * distance * Math.cos(angleX);
 const camZ = player.position.z + Math.cos(angleY) * distance * Math.cos(angleX);
 const camY = player.position.y + 5 + Math.sin(angleX) * 5;

 camera.position.set(camX, camY, camZ);
 camera.lookAt(player.position);

 renderer.render(scene,camera);
}

animate();

// resize
window.addEventListener("resize",()=>{
 camera.aspect = innerWidth/innerHeight;
 camera.updateProjectionMatrix();
 renderer.setSize(innerWidth, innerHeight);
});

</script>
</body>
</html>
