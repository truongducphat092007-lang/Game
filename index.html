<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mew 3D</title>
<style>
body{margin:0;overflow:hidden}
</style>
</head>
<body>

<!-- THƯ VIỆN -->
<script src="https://cdn.jsdelivr.net/npm/three@0.152/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.152/examples/js/loaders/GLTFLoader.js"></script>

<script>

// ===== 1. TẠO THẾ GIỚI =====
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);

// ===== 2. CAMERA =====
const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
camera.position.set(0,5,10);

// ===== 3. RENDER =====
const renderer = new THREE.WebGLRenderer();
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

// ===== 4. ÁNH SÁNG =====
scene.add(new THREE.AmbientLight(0xffffff,1));

// ===== 5. MẶT ĐẤT =====
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(100,100),
  new THREE.MeshStandardMaterial({color:0x3cb043})
);
ground.rotation.x = -Math.PI/2;
scene.add(ground);

// ===== 6. NHÂN VẬT =====
let player;
const loader = new THREE.GLTFLoader();

// 👉 LOAD MEW
loader.load(
  "https://truongducphat090207-lang.github.io/tro-choi/mew.glb",

  // thành công
  function(gltf){
    player = gltf.scene;
    player.scale.set(5,5,5);
    player.position.y = 1;
    scene.add(player);
    console.log("Mew OK");
  },

  undefined,

  // lỗi → hiện robot
  function(){
    loader.load(
      "https://threejs.org/examples/models/gltf/RobotExpressive.glb",
      function(gltf){
        player = gltf.scene;
        player.scale.set(2,2,2);
        player.position.y = 1;
        scene.add(player);
        console.log("Dùng robot");
      }
    );
  }
);

// ===== 7. DI CHUYỂN =====
const keys = {};

window.addEventListener("keydown", e=> keys[e.key]=true);
window.addEventListener("keyup", e=> keys[e.key]=false);

// ===== 8. GAME LOOP =====
function animate(){
  requestAnimationFrame(animate);

  if(player){
    if(keys["w"]) player.position.z -=0.2;
    if(keys["s"]) player.position.z +=0.2;
    if(keys["a"]) player.position.x -=0.2;
    if(keys["d"]) player.position.x +=0.2;

    // camera đi theo
    camera.position.set(
      player.position.x,
      player.position.y + 5,
      player.position.z + 10
    );

    camera.lookAt(player.position);
  }

  renderer.render(scene,camera);
}
animate();

</script>

</body>
</html>
