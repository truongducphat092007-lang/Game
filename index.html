<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Pokemon Mew Game</title>
<style>
body{margin:0;overflow:hidden}
#text{
position:fixed;
top:10px;
left:10px;
background:black;
color:white;
padding:5px;
}
</style>
</head>
<body>

<div id="text">Đang load...</div>

<!-- THREE -->
<script src="https://cdn.jsdelivr.net/npm/three@0.152/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.152/examples/js/loaders/GLTFLoader.js"></script>

<script>

// ===== HIỂN THỊ TEXT =====
const text = document.getElementById("text");

// ===== SCENE =====
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);

// ===== CAMERA =====
const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
camera.position.set(0,6,10);

// ===== RENDER =====
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

// ===== ÁNH SÁNG =====
scene.add(new THREE.AmbientLight(0xffffff,1));

// ===== MẶT ĐẤT =====
const ground = new THREE.Mesh(
 new THREE.PlaneGeometry(200,200),
 new THREE.MeshBasicMaterial({color:0x3cb043})
);
ground.rotation.x = -Math.PI/2;
scene.add(ground);

// ===== CÂY =====
function createTree(x,z){
 const trunk = new THREE.Mesh(
  new THREE.CylinderGeometry(0.3,0.3,2),
  new THREE.MeshBasicMaterial({color:0x8B4513})
 );
 trunk.position.set(x,1,z);

 const leaf = new THREE.Mesh(
  new THREE.SphereGeometry(1),
  new THREE.MeshBasicMaterial({color:0x228B22})
 );
 leaf.position.set(x,2.5,z);

 scene.add(trunk,leaf);
}

// tạo nhiều cây
for(let i=0;i<15;i++){
 createTree(Math.random()*100-50, Math.random()*100-50);
}

// ===== LOAD MEW =====
let player;
const loader = new THREE.GLTFLoader();

loader.load(
 "mew.glb",

 function(gltf){
  player = gltf.scene;
  player.scale.set(2,2,2);
  player.position.set(0,1,0);
  scene.add(player);

  text.innerHTML = "Mew OK";
 },

 undefined,

 function(){
  text.innerHTML = "Lỗi Mew → dùng nhân vật thay";

  // fallback
  player = new THREE.Mesh(
   new THREE.BoxGeometry(1,2,1),
   new THREE.MeshBasicMaterial({color:0xff0000})
  );
  player.position.y = 1;
  scene.add(player);
 }
);

// ===== ĐIỀU KHIỂN =====
const keys = {};

window.addEventListener("keydown", e=> keys[e.key]=true);
window.addEventListener("keyup", e=> keys[e.key]=false);

// ===== GAME LOOP =====
function animate(){
 requestAnimationFrame(animate);

 if(player){
  if(keys["w"]) player.position.z -=0.2;
  if(keys["s"]) player.position.z +=0.2;
  if(keys["a"]) player.position.x -=0.2;
  if(keys["d"]) player.position.x +=0.2;

  // camera theo sau
  camera.position.set(
   player.position.x,
   player.position.y + 6,
   player.position.z + 10
  );

  camera.lookAt(player.position);
 }

 renderer.render(scene,camera);
}
animate();

// ===== RESIZE =====
window.addEventListener("resize", ()=>{
 camera.aspect = innerWidth/innerHeight;
 camera.updateProjectionMatrix();
 renderer.setSize(innerWidth, innerHeight);
});

</script>

</body>
</html>
